<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="script.js"></script>

</head>

<body>
    <main>
        <h1>My library</h1>
        <div class="form-div">
            <button class="toogle-button">Add Book</button>


            <div class="modal hide">
                <button class="close-btn">X</button>
                <form id="add-book">
                    <div class="form-row">
                        <label for="name">Book</label>
                        <input required placeholder="e.g. The Hobbit" type="text" id="name" name="name">
                    </div>
                    <div class="form-row">
                        <label for="author">Author</label>
                        <input required placeholder="e.g. Tolkien" type="text" id="author" name="author">
                    </div>
                    <div class="form-row">
                        <label for="page">Page</label>
                        <input id="page" name="Page" placeholder="e.g. 256" type="number" min="1" max="100000">
                    </div>
                    <div>
                        <label for="read"><input value="1" type="checkbox" name="read" id="read"> Mark as Read </label>
                        <button type="submit">Save</button>

                    </div>
                </form>
            </div>
        </div>

        <div class="collection">
            <ol id="book-list">
                <li id="book-id">
                    <strong class="name">The Hobbit</strong>
                    <span class="author">J R R Tolkein</span>
                    <small class="page">256 p.</small>

                    <label for="mark-book-id"><input type="checkbox" name="mark-book-id" id="mark-book-id"> Mark as Read
                    </label>
                    <button class="delete">Delete</button>
                </li>


            </ol>
        </div>
    </main>
</body>

</html>
