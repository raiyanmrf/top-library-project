<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <main>
        <h1>My library</h1>
        <div class="form-div">
            <form action="" id="add-book"><button>Add new book</button></form>
        </div>

        <div class="collection">
            <ol id="book-list">
                <li id="">
                    <strong class="name">The Hobbit</strong>
                    <span class="author">J R R Tolkein</span>
                    <small class="page">256 p.</small>

                    <label for=""><input type="checkbox" name="mark" id=""> Mark as Read </label>
                    <button class="delete">Delete</button>
                </li>


            </ol>
        </div>
    </main>
</body>

</html>
